<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ragamuffin — Review Queue</title>
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --text-muted: #8b949e; --accent: #58a6ff; --danger: #f85149; --success: #3fb950; --warn: #d29922; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
  h1 { font-size: 1.4rem; margin-bottom: 16px; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .stat-card .num { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
  .stat-card .label { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
  .stat-card .num.danger { color: var(--danger); }
  .stat-card .num.warn { color: var(--warn); }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .filters select, .filters input { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 0.85rem; }
  .filters button { background: var(--accent); color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
  .filters button:hover { opacity: 0.9; }
  .entry { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
  .entry-header { display: flex; justify-content: space-between; align-items: flex-start; cursor: pointer; }
  .entry-key { font-weight: 600; font-family: monospace; word-break: break-all; }
  .entry-value { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .entry-meta { display: flex; gap: 12px; margin-top: 6px; font-size: 0.75rem; color: var(--text-muted); flex-wrap: wrap; }
  .reason-tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
  .reason-tag.stale { background: #3a1e1e; color: var(--danger); }
  .reason-tag.contradiction { background: #2d1f0e; color: var(--warn); }
  .reason-tag.low_confidence { background: #1c2a3a; color: var(--accent); }
  .reason-tag.supersession { background: #1a2e1a; color: var(--success); }
  .entry-details { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); display: none; font-size: 0.85rem; }
  .entry-details.open { display: block; }
  .entry-details dl { display: grid; grid-template-columns: 120px 1fr; gap: 4px 8px; }
  .entry-details dt { color: var(--text-muted); }
  .entry-details dd { word-break: break-all; }
  .actions { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
  .actions button { padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 0.8rem; background: var(--card); color: var(--text); }
  .actions button.confirm { background: #1a3a1a; border-color: var(--success); color: var(--success); }
  .actions button.reject { background: #3a1a1a; border-color: var(--danger); color: var(--danger); }
  .actions button:hover { opacity: 0.85; }
  .loading { text-align: center; color: var(--text-muted); padding: 40px; }
  .error { color: var(--danger); padding: 20px; text-align: center; }
  .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
  .pagination button { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; color: var(--text); cursor: pointer; }
  .pagination button:disabled { opacity: 0.4; cursor: default; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 0.85rem; display: none; z-index: 100; }
</style>
</head>
<body>
<h1>📋 Review Queue</h1>
<div class="stats" id="stats"></div>
<div class="filters">
  <select id="reason-filter"><option value="">All Reasons</option></select>
  <select id="source-filter"><option value="">All Sources</option></select>
  <select id="tag-filter"><option value="">All Tags</option></select>
  <input type="number" id="min-conf" placeholder="Min confidence" min="0" max="1" step="0.1" style="width:120px">
  <button onclick="loadQueue()">Refresh</button>
</div>
<div id="entries"></div>
<div class="pagination" id="pagination"></div>
<div class="toast" id="toast"></div>

<script>
const BASE = '';
let nextToken = null;
let prevTokens = [];
let currentFilters = {};

async function api(path, opts) {
  const r = await fetch(BASE + path, opts);
  const body = await r.json();
  if (!r.ok) throw new Error(body.detail || body.error || r.statusText);
  return body;
}

function qs(sel) { return document.querySelector(sel); }

async function loadStats() {
  try {
    const s = await api('/v1/review/stats');
    const el = qs('#stats');
    const reasons = Object.entries(s.by_reason || {}).map(([k,v]) => `<div class="stat-card"><div class="num warn">${v}</div><div class="label">${k}</div></div>`).join('');
    const sources = Object.entries(s.by_source_type || {}).map(([k,v]) => `<div class="stat-card"><div class="num">${v}</div><div class="label">${k}</div></div>`).join('');
    el.innerHTML = `
      <div class="stat-card"><div class="num ${s.total_needs_review > 0 ? 'danger' : ''}">${s.total_needs_review}</div><div class="label">Needs Review</div></div>
      ${reasons}
      ${sources}
      <div class="stat-card"><div class="num">${s.avg_pending_days ? s.avg_pending_days.toFixed(1) : '-'}</div><div class="label">Avg Pending Days</div></div>
      <div class="stat-card"><div class="num" style="font-size:0.85rem">${s.oldest_item ? new Date(s.oldest_item).toLocaleDateString() : '-'}</div><div class="label">Oldest Item</div></div>
    `;

    // Populate filter dropdowns
    const reasonSel = qs('#reason-filter');
    const reasonOpts = ['', ...Object.keys(s.by_reason || {})];
    if (reasonSel.options.length <= 1) reasonOpts.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r || 'All Reasons'; reasonSel.append(o); });

    const sourceSel = qs('#source-filter');
    const sourceOpts = ['', ...Object.keys(s.by_source_type || {})];
    if (sourceSel.options.length <= 1) sourceOpts.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s || 'All Sources'; sourceSel.append(o); });
  } catch (e) {
    qs('#stats').innerHTML = `<div class="error">Failed to load stats: ${e.message}</div>`;
  }
}

async function loadQueue(dir) {
  if (dir === 'next' && nextToken) prevTokens.push(nextToken);
  if (dir === 'prev' && prevTokens.length > 0) nextToken = prevTokens.pop();

  const filters = {
    reason: qs('#reason-filter').value,
    source_type: qs('#source-filter').value,
    tag: qs('#tag-filter').value,
    min_confidence: qs('#min-conf').value,
    limit: 25,
  };
  if (nextToken && dir !== 'prev' && dir !== 'first') filters.before = nextToken;

  const params = new URLSearchParams();
  Object.entries(filters).forEach(([k,v]) => { if (v) params.set(k, v); });

  currentFilters = filters;
  qs('#entries').innerHTML = '<div class="loading">Loading…</div>';

  try {
    const data = await api('/v1/review?' + params.toString());
    renderEntries(data.entries || []);
    qs('#pagination').innerHTML = `
      <button onclick="loadQueue('prev')" ${prevTokens.length === 0 ? 'disabled' : ''}>← Previous</button>
      <button onclick="loadQueue('next')" ${data.next_token ? '' : 'disabled'}>Next →</button>
    `;
  } catch (e) {
    qs('#entries').innerHTML = `<div class="error">${e.message}</div>`;
  }
}

function renderEntries(entries) {
  const el = qs('#entries');
  if (entries.length === 0) { el.innerHTML = '<div style="color:var(--text-muted);padding:20px;text-align:center">No items need review</div>'; return; }

  el.innerHTML = entries.map((e, i) => {
    const reasons = (e.review_reasons || []).map(r => `<span class="reason-tag ${r.type}">${r.type.replace(/_/g,' ')}</span>`).join(' ');
    const tags = (e.tags || []).map(t => `<span class="reason-tag" style="background:var(--card);border:1px solid var(--border);color:var(--text-muted)">${t}</span>`).join(' ');

    return `<div class="entry" data-idx="${i}">
      <div class="entry-header" onclick="toggleDetails(${i})">
        <div>
          <div class="entry-key">${esc(e.key)}</div>
          <div class="entry-value">${esc(e.value)}</div>
        </div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0">${reasons}</div>
      </div>
      <div class="entry-meta">
        <span>${e.source_type || 'unknown'}</span>
        <span>${e.confidence != null ? 'c='+e.confidence.toFixed(2) : ''}</span>
        <span>${e.created_at ? new Date(e.created_at).toLocaleDateString() : ''}</span>
        ${tags}
      </div>
      <div class="entry-details" id="details-${i}">
        <dl>
          <dt>Key</dt><dd>${esc(e.key)}</dd>
          <dt>Value</dt><dd>${esc(e.value)}</dd>
          ${e.source ? '<dt>Source</dt><dd>'+esc(e.source)+'</dd>' : ''}
          ${e.source_type ? '<dt>Source Type</dt><dd>'+esc(e.source_type)+'</dd>' : ''}
          ${e.confidence != null ? '<dt>Confidence</dt><dd>'+e.confidence.toFixed(3)+'</dd>' : ''}
          ${e.created_at ? '<dt>Created</dt><dd>'+new Date(e.created_at).toLocaleString()+'</dd>' : ''}
          ${e.last_confirmed_at ? '<dt>Last Confirmed</dt><dd>'+new Date(e.last_confirmed_at).toLocaleString()+'</dd>' : ''}
          ${e.updated_at ? '<dt>Updated</dt><dd>'+new Date(e.updated_at).toLocaleString()+'</dd>' : ''}
        </dl>
        <div class="actions">
          <button class="confirm" onclick="resolveAction('${esc(e.key)}','confirm',${i})">✓ Confirm</button>
          <button class="reject" onclick="resolveAction('${esc(e.key)}','reject',${i})">✕ Reject</button>
          <button onclick="resolveAction('${esc(e.key)}','supersede',${i})">↻ Supersede</button>
          <button onclick="resolveAction('${esc(e.key)}','reclassify',${i})">↺ Reclassify</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleDetails(i) {
  const el = document.getElementById('details-'+i);
  el.classList.toggle('open');
}

async function resolveAction(key, action, idx) {
  let body = { action };

  if (action === 'supersede') {
    const newKey = prompt('New key (or blank to only mark superseded):');
    if (newKey) {
      const newVal = prompt('New value:');
      if (newVal) { body.new_key = newKey; body.new_value = newVal; }
    }
  }
  if (action === 'reclassify') {
    const conf = prompt('New confidence (0.0-1.0):');
    if (conf) body.confidence = parseFloat(conf);
  }

  try {
    const r = await api('/v1/review?key='+encodeURIComponent(key), {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body),
    });
    showToast(`${action}: ${key} — done`);
    // Remove entry from DOM
    const entry = document.querySelector(`.entry[data-idx="${idx}"]`);
    if (entry) entry.remove();
    loadStats();
  } catch (e) {
    showToast('Error: '+e.message);
  }
}

function showToast(msg, err) {
  const el = qs('#toast');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.borderColor = err ? 'var(--danger)' : 'var(--success)';
  setTimeout(() => el.style.display = 'none', 3000);
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Initial load
loadStats();
loadQueue();
</script>
</body>
</html>
