# Workflow A — PR Check
# Runs on every PR targeting `testing`. Gates merge with fast CI.
# Target: <5 minutes

name: PR Check

on:
  pull_request:
    branches: [testing]

env:
  DOCKERHUB_REPO: chezgoulet

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Check formatting (gofmt)
        run: |
          UNFMT=$(gofmt -l .)
          if [ -n "$UNFMT" ]; then
            echo "Unformatted files:"
            echo "$UNFMT"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./internal/... ./cmd/...

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.25'
          check-latest: true

      - name: Run Go tests
        run: go test -timeout 120s ./internal/... ./cmd/...

      - name: REACHLOCK_CONTRACT (R4)
        # Proves the C3 subset of the REST surface that REACHLOCK binds
        # to (see docs/REACHLOCK-VAULT-CONVENTIONS.md and the upstream
        # MEMORY-INTERFACE.md in the REACHLOCK repo) keeps working.
        run: go test -timeout 60s -run TestContract_Ragamuffin_REACHLOCK_Binding -v ./internal/server/

  docker-build:
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify image compiles
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: chezgoulet/ragamuffin:pr-check
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.pull_request.head.repo.updated_at || github.event.repository.updated_at }}

  smoke-test:
    needs: docker-build
    runs-on: ubuntu-latest
    # Disabled: requires Qdrant + an embedding provider in CI.
    # Enable once we have a CI-compatible Qdrant service or mock.
    if: false
    steps:
      - name: Run smoke test
        run: |
          echo "smoke test placeholder — needs Qdrant in CI"
