name: Build & Release

on:
  push:
    tags: ['v*']

env:
  DOCKERHUB_REPO: chezgoulet

jobs:
  # ── Test ────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run Go tests
        run: go test -timeout 120s ./internal/... ./cmd/...
  test-adapter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install Python deps
        run: pip install pytest requests
      - name: Run adapter tests
        run: pytest plugins/memory_ragamuffin_hermes/tests/ -v

  # ── Docker build + push ────────────────────────────────────────────────
  docker:
    needs: [test, test-adapter]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.DOCKERHUB_REPO }}/${{ github.event.repository.name }}
          tags: |
            type=ref,event=tag
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}

  # ── Binary release ─────────────────────────────────────────────────────
  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w \
              -X 'github.com/chezgoulet/ragamuffin/internal/server.Version=${{ github.ref_name }}' \
              -X 'github.com/chezgoulet/ragamuffin/internal/server.Commit=${{ github.sha }}' \
              -X 'github.com/chezgoulet/ragamuffin/internal/server.BuildDate=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}' \
              -X 'github.com/chezgoulet/ragamuffin/internal/server.GoVersion=$(go version | cut -d' ' -f3)'" \
            -o ragamuffin-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/ragamuffin
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ragamuffin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ragamuffin-${{ matrix.goos }}-${{ matrix.goarch }}

  create-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ragamuffin-*
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ragamuffin-*
          generate_release_notes: true
