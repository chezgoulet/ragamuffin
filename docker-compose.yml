name: ragamuffin

services:
  ragamuffin:
    image: chezgoulet/ragamuffin:0.5
    container_name: ragamuffin
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - "${RAGAMUFFIN_VAULT_PATH:-/opt/vault}:/opt/vault"
    environment:
      RAGAMUFFIN_VAULT_PATH: /opt/vault
      RAGAMUFFIN_QDRANT_URL: http://qdrant:6334
      RAGAMUFFIN_EMBEDDING_API_KEY: ${RAGAMUFFIN_EMBEDDING_API_KEY}
      RAGAMUFFIN_EMBEDDING_MODEL: ${RAGAMUFFIN_EMBEDDING_MODEL:-text-embedding-3-small}
      RAGAMUFFIN_EMBEDDING_BASE_URL: ${RAGAMUFFIN_EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      RAGAMUFFIN_EMBEDDING_DIMS: ${RAGAMUFFIN_EMBEDDING_DIMS:-1536}
      RAGAMUFFIN_CHUNK_MAX_TOKENS: ${RAGAMUFFIN_CHUNK_MAX_TOKENS:-2000}
      RAGAMUFFIN_WATCHER_MODE: ${RAGAMUFFIN_WATCHER_MODE:-poll}
      RAGAMUFFIN_RATE_LIMIT_ENABLED: ${RAGAMUFFIN_RATE_LIMIT_ENABLED:-true}
      RAGAMUFFIN_LLM_PROVIDER: ${RAGAMUFFIN_LLM_PROVIDER:-}
      RAGAMUFFIN_LLM_BASE_URL: ${RAGAMUFFIN_LLM_BASE_URL:-}
      RAGAMUFFIN_LLM_MODEL: ${RAGAMUFFIN_LLM_MODEL:-}
      RAGAMUFFIN_LLM_API_KEY: ${RAGAMUFFIN_LLM_API_KEY:-}
      RAGAMUFFIN_GIT_PROVIDER_ENABLED: ${RAGAMUFFIN_GIT_PROVIDER_ENABLED:-false}
      RAGAMUFFIN_GIT_PROVIDER: ${RAGAMUFFIN_GIT_PROVIDER:-github}
      RAGAMUFFIN_GIT_TOKEN: ${RAGAMUFFIN_GIT_TOKEN:-}
      RAGAMUFFIN_GIT_BASE_URL: ${RAGAMUFFIN_GIT_BASE_URL:-}
      RAGAMUFFIN_GIT_REPOS: ${RAGAMUFFIN_GIT_REPOS:-}
      RAGAMUFFIN_LOG_LEVEL: ${RAGAMUFFIN_LOG_LEVEL:-info}
      # v0.4: Multi-tenancy
      RAGAMUFFIN_VAULTS: ${RAGAMUFFIN_VAULTS:-}
      # v0.4: Auth
      RAGAMUFFIN_AUTH_MODE: ${RAGAMUFFIN_AUTH_MODE:-none}
      RAGAMUFFIN_AUTH_READ_KEY: ${RAGAMUFFIN_AUTH_READ_KEY:-}
      RAGAMUFFIN_AUTH_WRITE_KEY: ${RAGAMUFFIN_AUTH_WRITE_KEY:-}
      RAGAMUFFIN_AUTH_JWT_ISSUER: ${RAGAMUFFIN_AUTH_JWT_ISSUER:-}
      RAGAMUFFIN_AUTH_JWT_AUDIENCE: ${RAGAMUFFIN_AUTH_JWT_AUDIENCE:-}
      RAGAMUFFIN_AUTH_JWT_JWKS_URL: ${RAGAMUFFIN_AUTH_JWT_JWKS_URL:-}
    ports:
      - "127.0.0.1:${RAGAMUFFIN_PORT:-8000}:8000"
    networks:
      - ragamuffin
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: ragamuffin-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ragamuffin
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  ragamuffin:
    driver: bridge

volumes:
  qdrant_data:
